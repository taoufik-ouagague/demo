# Server Configuration
server.port=8080
server.servlet.context-path=/

# ⚠️ SECURITY MITIGATION — CVE GHSA-72hv-8253-57qq
# Jackson Core 3.0.4 async parser DoS vulnerability
# DO NOT remove the limits below until jackson-core is patched
# (scheduled for Spring Boot 4.1.0+ upgrade)
# Attackers exploit bypassed number length constraints → memory/CPU exhaustion
# These payload size limits prevent exploitation by blocking oversized requests
security.mitigated-cve=GHSA-72hv-8253-57qq
spring.servlet.multipart.max-request-size=1MB
spring.servlet.multipart.max-file-size=1MB
server.tomcat.max-http-form-post-size=1048576

# Database Configuration - PostgreSQL (Development)
spring.datasource.url=jdbc:postgresql://localhost:5432/demo
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=299077

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.hibernate.engine.transaction.internal.TransactionImpl=DEBUG

# Entity Scan Configuration
spring.jpa.properties.hibernate.mapping.default_catalog=demo
spring.jpa.properties.hibernate.mapping.default_schema=public

# Application Name
spring.application.name=demo
# JWT Configuration
app.jwtSecret=mySecureSecretKeyThatIsAtLeast32CharactersLongForHS256Algorithm
app.jwtExpirationMs=86400000